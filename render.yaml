services:
  - type: web
    name: nail-studio-backend
    runtime: node
    plan: free
    buildCommand: apt-get update && apt-get install -y chromium && npm install
    startCommand: node index.js
    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT
        scope: build,runtime
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
        scope: runtime
